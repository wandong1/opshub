  pushgateway_skyeye:
    image: ${PUSHGATEWAY_IMAGE}
    container_name: pushgateway_skyeye
    restart: always
    ports:
      - "19091:9091"
    networks:
      - opshub-network

  prom_skyeye:
    image: ${PROMETHEUS_IMAGE}
    container_name: prom_skyeye
    restart: always
    networks:
      - opshub-network
    volumes:
      - /etc/localtime:/etc/localtime
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/prometheus/web-config.yml:/etc/prometheus/web-config.yml
      - ./config/prometheus/conf.d:/etc/prometheus/conf.d
      - ./third_party_data/prom_data:/prometheus/data
    command: --config.file=/etc/prometheus/prometheus.yml --web.config.file=/etc/prometheus/web-config.yml --web.enable-lifecycle --web.enable-remote-write-receiver --storage.tsdb.retention.time=30d
    security_opt:
      - seccomp=unconfined
    privileged: true
    user: "root:root"
    ports:
      - "19090:9090"
  
  victoria_metrics:
    image: victoriametrics/victoria-metrics:latest
    ports:
      - "8428:8428"  # 数据写入端口
      - "8481:8481"  # 管理端口
    volumes:
      - .third_party_data/vm-data:/var/lib/victoria-metrics-data
    command:
      - "-storageDataPath=/var/lib/victoria-metrics-data"
      - "-retentionPeriod=7d"

  prometheus-mcp-server:
    image: ghcr.io/tjhop/prometheus-mcp-server:latest
    container_name: prometheus-mcp-server
    restart: unless-stopped
    ports:
      - "18080:8080"
    command:
      - --prometheus.url
      - "http://prom_skyeye:9090"
      - --http.config
      - "/etc/prometheus-http-config.yml" 
      - --mcp.transport
      - "http"
      - --web.listen-address
      - ":8080"
    volumes:
      # 将本地的 HTTP 配置文件挂载到容器内
      - ./config/prometheus/prometheus-http-config-mcp.yml:/etc/prometheus-http-config.yml:ro
    networks:
      - opshub-network

  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: grafana_mon
    restart: always
    volumes:
      - ./third_party_data/skyeye_grafana_data:/var/lib/grafana
      - ./config/grafana/plugins:/var/lib/grafana/plugins
      - ./config/grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./config/grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
    labels:
      - skyeye=true
    security_opt:
      - seccomp=unconfined
    networks:
      - opshub-network
    ports:
      - "3000:3000"
    privileged: true
    user: "root:root"

  n8n:
    image: n8nio/n8n  # 对应原命令的镜像名
    container_name: n8n  # 对应原命令的 --name n8n
    restart: always  # 推荐添加：容器退出时自动重启，增强可用性
    networks:
      - opshub-network
    ports:
      - "5678:5678" 
    environment:
      # 时区相关环境变量
      - GENERIC_TIMEZONE=Asia/Shanghai
      - TZ=Asia/Shanghai
      # N8N配置相关
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_HOST=0.0.0.0
      - N8N_SECURE_COOKIE=false
    volumes:
      - ./third_party_data/n8n_data:/home/node/.n8n

  nacos:
    image: nacos/nacos-server:v2.4.2
    container_name: nacos-server
    ports:
      - "7848:7848"
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    privileged: true
    environment:
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_PORT=3306
      - JVM_XMX=4g
      - PREFER_HOST_MODE=hostname
      - JVM_XMN=1g
      - MODE=standalone
      - MYSQL_SERVICE_HOST=172.16.38.1
      - MYSQL_SERVICE_DB_NAME=nacos_config
      - MYSQL_SERVICE_USER=root
      - MYSQL_SERVICE_PASSWORD=OpsHub@2026
      - JVM_XMS=4g
    working_dir: /home/nacos
    entrypoint: bin/docker-startup.sh 
    restart: always
    networks:
      - opshub-network
