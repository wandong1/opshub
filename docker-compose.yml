  mysql-data:
    driver: local
  redis-data:
    driver: local
  clickhouse-data:
    driver: local
  mongodb-data:
    driver: local
  kafka-data:
    driver: local
  milvus-etcd-data:
    driver: local
  milvus-minio-data:
    driver: local
  milvus-data:
    driver: local

networks:
  opshub-network:
    driver: bridge
